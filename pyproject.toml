"prov" = "*"
"pyproj" = ">=2.1"
"pys2index" = "*"
"python" = ">=3.12"
"python-cdo" = "*"
"python-dateutil" = "*"
"pyyaml" = "*"
"rasterio" = ">=1.3.10"
"requests" = "*"
"scikit-image" = "*"
"scikit-learn" = ">=1.4.0"  # github.com/ESMValGroup/ESMValTool/issues/3504
"scipy" = "*"
"seaborn" = "*"
"seawater" = "*"
"shapely" = ">=2.0.2"
"xarray" = ">=0.12.0"
"xesmf" = ">=0.7.1"
"xgboost" = ">1.6.1"  # github.com/ESMValGroup/ESMValTool/issues/2779
