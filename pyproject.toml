[tool.pixi.workspace]
channels = [
    "conda-forge",
    # "conda-forge/label/esmvalcore_rc",  # Uncomment to use ESMValCore release candidates.
    "nodefaults",
]
platforms = ["linux-64", "osx-arm64"]

[tool.pixi.pypi-dependencies]
"ESMValTool" = { path = "." , editable = true }

[tool.pixi.environments]
# The environments below correspond to the different packages we have on conda-forge:
# esmvaltool-python (default), esmvaltool-ncl, esmvaltool-r, and esmvaltool.
# For each package, we have a development environment (with the `dev`, `doc`,
# and `test` features) and a regular environment without these features.
#
# Environment for running diagnostics that only require Python.
default = { features = ["esmvalcore", "dev", "doc", "test"], solve-group = "default" }
esmvaltool-python = { features = ["esmvalcore"], solve-group = "default" }
# Environment for running diagnostics that also require NCL.
esmvaltool-ncl-dev = { features = ["esmvalcore", "ncl", "dev", "doc", "test"], solve-group = "ncl" }
esmvaltool-ncl = { features = ["esmvalcore", "ncl"], solve-group = "ncl" }
# Environment for running diagnostics that also require R.
esmvaltool-r-dev = { features = ["esmvalcore", "r", "dev", "doc", "test"], solve-group = "r" }
esmvaltool-r = { features = ["esmvalcore", "r"], solve-group = "r" }
# Environment for running any diagnostic.
esmvaltool-dev = { features = ["esmvalcore", "ncl", "r", "dev", "doc", "test"], solve-group = "esmvaltool" }
esmvaltool = { features = ["esmvalcore", "ncl", "r"], solve-group = "esmvaltool" }
# Environment with the development version of ESMValCore for testing new features and bug fixes.
esmvalcore-dev = { features = ["esmvalcore-dev", "dev", "doc", "test"], solve-group = "esmvalcore-dev" }
# Environments for running tests with specific Python versions.
test-py312 = { features = ["py312", "esmvalcore", "test"], solve-group = "py312" }
test-py313 = { features = ["py313", "esmvalcore", "test"], solve-group = "default" }

# Default ESMValCore version.
[tool.pixi.feature.esmvalcore.dependencies]
"ESMValCore" = ">=2.14.0"

# Use the development version of ESMValCore to test new features and bug fixes.
[tool.pixi.feature.esmvalcore-dev.pypi-dependencies]
"ESMValCore" = { git = "https://github.com/ESMValGroup/ESMValCore.git", branch = "main" }
# Replace the line above with the following to use a local ESMValCore repository instead.
# "ESMValCore" = { path = "../ESMValCore", editable = true }

# Tools for running the tests.
[tool.pixi.feature.test.dependencies]
"pytest" = ">=6.0.0"
"pytest-cov" = ">=2.10.1"
"pytest-env" = "*"
"pytest-html" = "!=2.1.0"
"pytest-metadata" = ">=1.5.1"
"pytest-mock" = "*"
"pytest-xdist" = "*"

# Tools for building the documentation.
[tool.pixi.feature.doc.dependencies]
"autodocsumm" = ">=0.2.2"
"myst-nb" = "*"
"pydata-sphinx-theme" = "*"
"sphinx" = ">=6.1.3,<9"     # <9 due to ESMValTool/issues/4316

# Other development tools.
[tool.pixi.feature.dev.dependencies]
codespell = "*"
pre-commit = "*"
py-spy = "*"
ruff = "==0.14.5" # keep in sync with .pre-commit-config.yaml
yamllint = "*"

# Feature for running tests with Python 3.12.
[tool.pixi.feature.py312.dependencies]
"python" = "3.12.*"

# Feature for running tests with Python 3.13.
[tool.pixi.feature.py313.dependencies]
"python" = "3.13.*"

# Feature for running diagnostics that also require NCL.
[tool.pixi.feature.ncl]
platforms = ["linux-64"]

[tool.pixi.feature.ncl.dependencies]
"ncl" = ">=6.6.2"
"cdo" = "*"
"nco" = "*"
"imagemagick" = "*"

# Feature for running diagnostics that also require R.
[tool.pixi.feature.r]
