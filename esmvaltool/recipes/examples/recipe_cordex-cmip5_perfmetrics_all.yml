documentation:
  title: |
    Example recipe that computes performance metrics for CORDEX-CMIP5 models.
  description: |
    This is an example recipe that computes performance metrics for CORDEX-CMIP5 models.
    The outcome of this recipe is used for deliverable DX.X of the project ESO4Clima.
  authors:
    - loosveldt-tomas_saskia
    - andela_bouwe
  maintainer:
    - loosveldt-tomas_saskia

preprocessors:
  ts_pp:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    mask_landsea:
      mask_out: sea
    regrid:
      target_grid: EUR-11
      scheme: 'linear'
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics: # fails because of different data types in CCLM4-8-17 and issue in regrid that removes coordinates prevents the merging of cubes
     span: overlap
     statistics:
       - operator: mean
       - operator: percentile
         percent: 50
     groupby: ['project']
     exclude: [reference_dataset]
  pp:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    regrid:
      target_grid: EUR-11
      scheme: 'linear'
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics: # fails because of different data types in CCLM4-8-17 and issue in regrid that removes coordinates prevents the merging of cubes
     span: overlap
     statistics:
       - operator: mean
       - operator: percentile
         percent: 50
     groupby: ['project']
     exclude: [reference_dataset]

