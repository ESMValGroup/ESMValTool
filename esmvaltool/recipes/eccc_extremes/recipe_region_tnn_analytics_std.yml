# ESMValTool
# recipe_bc_extremes_txx.yml
---
documentation:

  title: GEVs 2021 BC heatwave

  description: This is a recipe for doing model evaluation for .

  authors:
    - malinina_elizaveta

preprocessors:
  preproc_model:
    custom_order: True
    regrid:
      target_grid: 0.5x0.5
      lon_offset: 0.25
      lat_offset: 0.25
      scheme: linear    
    extract_shape:
      shapefile: Stone_regions_WRAF05_v4_1_Canada.shp
      method: contains
      crop: True
      ids:
        ID:
          - Alberta
    area_statistics:
      operator: mean
    extract_season:
      season: SONDJFMAM
    seasonal_statistics:
      seasons: [SONDJFMAM]
      operator: min
    detrend:
      dimension: time
      method: linear
    climate_statistics:
      operator: std_dev
      period: full  

  preproc_era:
    custom_order: True  
    extract_shape:
      shapefile: Stone_regions_WRAF05_v4_1_Canada.shp
      method: contains
      crop: True
      ids:
        ID:
          - Alberta
    area_statistics:
      operator: mean 
    extract_season:
      season: SONDJFMAM
    seasonal_statistics:
      seasons: [SONDJFMAM]
      operator: min
    detrend:
      dimension: time
      method: linear
    climate_statistics:
      operator: std_dev
      period: full  

