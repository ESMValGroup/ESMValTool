diagnostics:
  analytics:
    description: Figure for BC extremes
    variables:
      txnx_all:
        short_name: tasmin
        mip: day
        start_day: 1
        start_month: 7
        end_day: 1
        end_month: 7
        project: CMIP6
        preprocessor: preproc_model
        additional_datasets: *datasets_cmip
      reference: 
        short_name: tasmin
        mip: day
        start_day: 1
        start_month: 7
        end_day: 1
        end_month: 7
        preprocessor: preproc_era
        additional_datasets: *dataset_era 
    scripts:
      variability:
        script: eccc_extremes/perkins_skill_score.py
        mpl_style: malinina24
        color_style: malinina24
        units: K
        region: Alberta # needed for the figure title
        var_label: tasmin_ano # needed for axis name
        bin_width: 0.5 # needed for the histogram bins
