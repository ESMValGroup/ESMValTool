# ESMValTool
---
documentation:
  title: >
    Transient Climate Response to Cumulative CO2 Emissions (TCRE).
  description: >
    Calculate Transient Climate Response to Cumulative CO2 Emissions (TCRE).
  authors:
    - schlund_manuel
  maintainer:
    - schlund_manuel
  references:
    - sanderson24gmd


preprocessors:
  global_annual_mean_anomaly:
    custom_order: true
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean

  global_cumulative_sum:
    custom_order: true
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
    cumulative_sum:
      coord: time
      weights: true
    convert_units:
      units: Pg


diagnostics:
  tcre:
    variables:
      tas:
        branding_suffix: tavg-h2m-hxy-u
        preprocessor: global_annual_mean_anomaly
        additional_datasets:
          - {project: CMIP7, dataset: DUMMY-MODEL, mip: atmos, frequency: mon, region: glb, exp: esm-flat10, ensemble: r1i1p1f1, grid: g999, institute: MPI-M, timerange: 18500101/19591231}
      tas_control:
        short_name: tas
        branding_suffix: tavg-h2m-hxy-u
        preprocessor: global_annual_mean_anomaly
        additional_datasets:
          - {project: CMIP7, dataset: DUMMY-MODEL, mip: atmos, frequency: mon, region: glb, exp: esm-piControl, ensemble: r1i1p1f1, grid: g999, institute: MPI-M, timerange: 18500101/19591231}
      fco2antt:
        branding_suffix: tavg-u-hxy-u
        preprocessor: global_cumulative_sum
        additional_datasets:
          - {project: CMIP7, dataset: DUMMY-MODEL, mip: atmos, frequency: mon, region: glb, exp: esm-flat10, ensemble: r1i1p1f1, grid: g999, institute: MPI-M, timerange: 18500101/19591231}
    scripts:
      calculate:
        script: climate_metrics/tcre.py
        caption: |
            Global annual mean near-surface air temperature anomaly ΔT vs.
            global annual cumulative CO2 emissions E of the emission-driven
            flat10 experiment with constant CO2 emissions of 10 Pg yr-1. The
            transient climate response to cumulative CO2 Emissions (TCRE) is
            defined as the 20-year average ΔT centered at the time where
            cumulative CO2 emissions E reach 1000 PgC (i.e., after 100 years).
        pyplot_kwargs:
          xlabel: E [PgC]
          ylabel: ΔT [K]
