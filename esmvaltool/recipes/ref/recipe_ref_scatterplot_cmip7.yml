        suptitle: 'ESACCI-CLOUD / CERES-EBAF'
        plot_filename: 'jointplot_clivi_lwcre_ESACCI-CLOUD_CERES-EBAF'

  plot_joint_clivi_lwcre_model:
    description: Scatterplot clt vs lwcre.
