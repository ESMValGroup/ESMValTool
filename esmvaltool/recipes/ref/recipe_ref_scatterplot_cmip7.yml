# ESMValTool
---
documentation:
  title: Model evaluation with focus on clouds.
  description: >
    Plot 2D histograms using the Seaborn diagnostic in ESMValTool.
  authors:
    - bock_lisa
    - lauer_axel
    - andela_bouwe
  maintainer:
    - bock_lisa

timerange_for_data: &time_period
#  timerange: '1996/2014'  # should end 2015 for CMIP7
  timerange: '1980/1999'  # should end 2015 for CMIP7
regridding: &regridding
  regrid:
    target_grid: 1x1
    # scheme:
      # reference: esmf_regrid.schemes:ESMFAreaWeighted
    scheme: area_weighted
levels_for_3d_vars: &extracting_levels
  extract_levels:
    # levels: {cmor_table: CMIP6, coordinate: plev27}
    levels: {cmor_table: CMIP7, coordinate: plev27}  # not clear which file will be used...
    coordinate: air_pressure
    scheme: linear


preprocessors:
  common_grid_clt:
    <<: *regridding
    custom_order: true
    mask_outside_range:
      minimum: 1.
      maximum: 100.
  common_grid_clivi_clwvi:
    custom_order: true
    <<: *regridding
    mask_outside_range:
      minimum: 0.01
      maximum: 0.2
  common_grid_lwcre:
    custom_order: true
    <<: *regridding
    mask_outside_range:
      minimum: 1.
      maximum: 100.
  common_grid_swcre:
    custom_order: true
    <<: *regridding
    mask_outside_range:
      minimum: -200.
      maximum: -1.
  common_grid_pr:
    custom_order: true
    <<: *regridding
    convert_units:
      units: mm day-1
    mask_outside_range:
      minimum: 0.1
      maximum: 4
  common_grid_levels_ta:
    custom_order: true
    <<: *extracting_levels
    <<: *regridding
    mask_outside_range:
      minimum: 200
      maximum: 280
  common_grid_levels_cli:
    custom_order: true
    <<: *extracting_levels
    <<: *regridding
    convert_units:
      units: g kg-1
    mask_outside_range:
      minimum: 0.0001
      maximum: 0.005


diagnostics:
  plot_joint_clt_swcre_model:
    description: Scatterplot clt vs swcre.
    variables:
      clt: &var_clt
        mip: Amon
        exp: historical
        preprocessor: common_grid_clt
        <<: *time_period
      swcre: &var_swcre
        <<: *var_clt
        preprocessor: common_grid_swcre
        derive: true
        force_derivation: false
    additional_datasets:
      # - {dataset: CESM2, project: CMIP6, grid: gn, ensemble: r1i1p1f1,
         # alias: CESM2}
      - {dataset: DUMMY-MODEL, project: CMIP7, activity: CMIP, branding_suffix: tavg-u-hxy-u,
         ensemble: r1i1p1f1, exp: historical, frequency: mon, grid: g999, institute: MPI-M,
         mip: atmos, region: glb, alias: DUMMY-MODEL}
    scripts:
      plot: &plot_settings_jointplot_clt_swcre
        script: seaborn_jointplot_histogram.py
        x: clt
        y: swcre
        bins: 20
        joint_kws:
          vmax: 0.015
          cmap: YlGnBu
        cbar: true
        cbar_kws:
          extend: 'max'
        marginal_kws:
          color: darkturquoise
        seaborn_settings:
          style: ticks
          rc:
            axes.titlepad: 15.0
        suptitle: 'DUMMY-MODEL'
        plot_filename: 'jointplot_clt_swcre_DUMMY-MODEL'

  plot_joint_clt_swcre_ref:
    description: Scatterplot clt vs swcre.
    variables:
      clt:
        <<: *var_clt
        additional_datasets:
          # - {dataset: ESACCI-CLOUD, project: OBS, type: sat,
             # version: AVHRR-AMPM-fv3.0, tier: 2, alias: ESACCI-CLOUD,
             # start_year: 2001, end_year: 2016}
          - {dataset: CLARA-AVHRR, project: OBS6, type: sat,
             version: A3-MONTHLY, tier: 3, alias: CLARA-AVHRR,
             start_year: 2001, end_year: 2016}
      swcre:
        <<: *var_swcre
        additional_datasets:
          # - {dataset: CERES-EBAF, project: OBS, type: sat,
             # version: Ed4.2, tier: 2, alias: CERES-EBAF,
             # start_year: 2001, end_year: 2016}
          - {dataset: CERES-EBAF-4-2-1, project: obs4MIPs, tier: 1,
             alias: CERES-EBAF, start_year: 2001, end_year: 2016}
    scripts:
      plot:
        <<: *plot_settings_jointplot_clt_swcre
        suptitle: 'CLARA-AVHRR / CERES-EBAF'
        plot_filename: 'jointplot_clt_swcre_CLARA-AVHRR_CERES-EBAF'

  plot_joint_clwvi_pr_ref:
    description: Scatterplot clwvi vs pr.
    variables:
      clwvi:
        <<: *var_clt
        preprocessor: common_grid_clivi_clwvi
        additional_datasets:
          # - {dataset: ESACCI-CLOUD, project: OBS, type: sat,
             # version: AVHRR-AMPM-fv3.0, tier: 2, alias: ESACCI-CLOUD,
             # start_year: 1992, end_year: 2016}
          - {dataset: CLARA-AVHRR, project: OBS6, type: sat,
             version: A3-MONTHLY, tier: 3, alias: CLARA-AVHRR,
             start_year: 2001, end_year: 2016}
      pr:
        <<: *var_clt
        preprocessor: common_grid_pr
        additional_datasets:
          # - {dataset: "GPCP-V2.3", project: obs4MIPs, tier: 1, alias: GPCP-SG,
             # start_year: 1992, end_year: 2016}
          - {dataset: "GPCP-V3.3", project: obs4MIPs, tier: 1, alias: GPCP,
             start_year: 2001, end_year: 2016}
    scripts:
      plot: &plot_settings_jointplot_clwvi_pr
        <<: *plot_settings_jointplot_clt_swcre
        x: clwvi
        y: pr
        joint_kws:
          vmax: 0.03
          cmap: YlGnBu
        suptitle: 'CLARA-AVHRR / GPCP'
        plot_filename: 'jointplot_clwvi_pr_CLARA-AVHRR_GPCP'

  plot_joint_clwvi_pr_model:
    description: Scatterplot clwvi vs pr.
    variables:
      clwvi:
        <<: *var_clt
        preprocessor: common_grid_clivi_clwvi
      pr:
        <<: *var_clt
        preprocessor: common_grid_pr
    additional_datasets:
      # - {dataset: CESM2, project: CMIP6, grid: gn, ensemble: r1i1p1f1,
