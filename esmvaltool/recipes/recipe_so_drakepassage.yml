# ESMValTool
# recipe_so_acc_sigma_tr.yml
---
documentation:
  description:
    Creates a transect through Drake Passage of zonal velocity with
    sigma contours overlaid.
  title:
    Drake Passage zonal velocity transect with sigma contour

  authors:
    - demora_lee

datasets:
  - dataset: HadGEM3-GC31-LL

preprocessors:
  # ------------------------------------------------------------------------
  # Preprocessor settings for Drake Passage transect
  # ------------------------------------------------------------------------
  # time_mean:
  #   climate_statistics:
  #     operator: 'mean'
  #     period: 'full'

  drakepassage_transect: # does this order matter? No.
    climate_statistics:
      operator: 'mean'
      period: 'full'
    extract_region: # probably needs changing
      start_longitude: 293
      end_longitude: 300
      start_latitude: -65
      end_latitude: -54

diagnostics:
  # ------------------------------------------------------------------------
  # Drake Passage zonal velocity transect with sigma contour
  # --------------------------------------------------------------------------------
  transect:
    description:  Transect of zonal velocity and sigma
    themes:
      - phys
    realms:
      - ocean
    variables:
      thetao: # Temperature ocean
        ensemble: r1i1p1f3
        exp: historical
        grid: gn
        mip: Omon
        project: CMIP6
        timerange: 2000/2001
        preprocessor: drakepassage_transect
      so:    # Salinity ocean
        ensemble: r1i1p1f3
        exp: historical
        grid: gn
        mip: Omon
        project: CMIP6
        timerange: 2000/2001
        preprocessor: drakepassage_transect
      uo:   # Zonal velocity ocean
        ensemble: r1i1p1f3
        exp: historical
        grid: gn
        mip: Omon
        project: CMIP6
        timerange: 2000/2001
        preprocessor: drakepassage_transect

    scripts:
      script1:
        script: southern_ocean/diagnostic_acc_sigma_tr.py
