             start_year: 2000, end_year: 2000, mip: Lmon}
          #- {dataset: HWSD, project: OBS, type: reanaly, version: 1.2, tier: 3,
          #   start_year: 2000, end_year: 2000, mip: Lmon}
    additional_datasets: *all
    scripts:
      carbon_storage_maps:
        script: carbon_cycle/cstorage_maps.py
        reference_datasets: [HWSD+NCSCD]
        relative_difference: true

  diag_carbon_storage_map_nbp:
    description: Two-variable scatter plot for cSoil and cVeg (Figure 12).
    themes:
      - phys
    realms:
      - land
    variables:
      nbp:
        preprocessor: cstorage_map
        project: CMIP6
        mip: Lmon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: CAMS #Jena_CarboScope
        plot_units: kgC m-2 yr-1
        additional_datasets:
          - { <<: *c6hist, dataset: CanESM5-CanOE, grid: gn, ensemble: r1i1p2f1}
          - {<<: *c6esmhist, dataset: GFDL-ESM4, ensemble: r1i1p1f1, grid: gr1}
          - {<<: *c6hist, dataset: INM-CM4-8, grid: gr1}
          - {<<: *c6hist, dataset: INM-CM5-0, grid: gr1}
          - {<<: *c5esmhist, dataset: FIO-ESM}
          - {<<: *c5, dataset: CanESM2}
          - {<<: *c5, dataset: inmcm4}

          - {dataset: Jena_CarboScope, project: OBS6, type: reanaly, version: v2020,
         tier: 2}
          - {dataset: CAMS, project: OBS6, type: reanaly, version: v20r2, tier: 2 }
    additional_datasets: *all
    scripts:
      carbon_storage_maps:
        script: carbon_cycle/cstorage_maps.py
        reference_datasets: [Jena_CarboScope, CAMS]
        relative_difference: false
        exclude_mmm: ['EC-Earth3-CC', 'EC-Earth3-Veg', 'MIROC-ESM', 'MIROC-ESM-CHEM']

  diag_carbon_storage_map_gpp:
    description: Two-variable scatter plot for cSoil and cVeg (Figure 12).
    themes:
      - phys
    realms:
      - land
    variables:
      gpp:
        preprocessor: cstorage_map
        project: CMIP6
