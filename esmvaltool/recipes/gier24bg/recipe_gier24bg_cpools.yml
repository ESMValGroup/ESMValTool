diagnostics:

  diag_carbon_storage_mean:
    description: Two-variable scatter plot for cSoil and cVeg (Figure 12).
    themes:
      - phys
    realms:
      - land
    variables:
      cVeg:
        preprocessor: cstorage_sum
        project: CMIP6
        mip: Lmon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: NDP
        plot_units: PgC
        additional_datasets: *all
      cVeg_obs:
        short_name: cVeg
        preprocessor: cstorage_sum_obs
        project: CMIP6
        mip: Lmon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: NDP
        plot_units: PgC
        additional_datasets:
          - {dataset: NDP, project: OBS, type: reanaly, version: 017b, tier: 2,
             start_year: 2000, end_year: 2000}
      cSoil_obs:
        short_name: cSoil
        preprocessor: cstorage_sum_obs
        project: CMIP6
        mip: Lmon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: HWSD+NCSCD
        plot_units: PgC
        additional_datasets:
          - {dataset: HWSD+NCSCD, project: OBS, type: reanaly, version: v1, tier: 3,
             start_year: 2000, end_year: 2000}
      cSoil:
        preprocessor: cstorage_sum
        project: CMIP6
        mip: Emon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: HWSD+NCSCD
        plot_units: PgC
        additional_datasets: *csoil
      cSoil1m:
        short_name: cSoilAbove1m
        preprocessor: cstorage_sum
        project: CMIP6
        mip: Emon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: HWSD+NCSCD
        plot_units: PgC
        additional_datasets: *csoil1m
      cLitter:
        preprocessor: cstorage_sum
        project: CMIP6
        mip: Lmon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        additional_datasets: *litter
#    additional_datasets:
    scripts:
      carbon_storage:
        script: carbon_cycle/cstorage.py
        exclude_mmm: ['BNU-ESM']

  diag_carbon_storage_map_cveg:
    description: Two-variable scatter plot for cSoil and cVeg (Figure 12).
    themes:
      - phys
    realms:
      - land
    variables:
      cVeg:
        preprocessor: cstorage_map
        project: CMIP6
        mip: Lmon
        exp: historical
        ensemble: r1i1p1f1
        start_year: 1986
        end_year: 2005
        reference_dataset: NDP
        plot_units: kgC m-2
        additional_datasets:
          - {dataset: NDP, project: OBS, type: reanaly, version: 017b, tier: 2,
             start_year: 2000, end_year: 2000}
    additional_datasets: *all
    scripts:
      carbon_storage_maps:
        script: carbon_cycle/cstorage_maps.py
        reference_datasets: [NDP]
        relative_difference: true

  diag_carbon_storage_map_csoil:
    description: Two-variable scatter plot for cSoil and cVeg (Figure 12).
    themes:
      - phys
    realms:
      - land
    variables:
