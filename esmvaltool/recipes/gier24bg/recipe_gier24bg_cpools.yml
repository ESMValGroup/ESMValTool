# ESMValTool
# recipe_gier21bg_carbonstorage.yml
---
documentation:

  title: >
    Carbon storage part of Gier et al 2022
  description: |
    Analysis of carbon storage (part of Gier et al., 2021).
  authors:
    - gier_bettina

  maintainer:
    - gier_bettina

  references:
    - acknow_author

  projects:
    - eval4cmip
    - 4c
    - crescendo

# YAML anchors

PROVENANCE_ANCHOR: &provenance
  realms:
    - atmos
  themes:
    - phys
    - ghg
    - carbon

preprocessors:

  cstorage_sum:
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'HWSD',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'BNU-ESM',
        'CESM2-WACCM',
        'EC-Earth3-CC',
        'FLUXCOM',
        'HWSD+NCSCD',
        'GLASS'
      ]
      fx_variables:
        sftlf:
          mip: fx
    climate_statistics:
      operator: mean
    area_statistics:
      operator: sum
    convert_units:
      units: Pg m-2

  cstorage_sum_obs:
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'HWSD',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'BNU-ESM',
        'CESM2-WACCM',
        'EC-Earth3-CC',
        'GFDL-ESM2M',
        'GFDL-ESM4',
        'FLUXCOM',
        'HWSD+NCSCD',
        'GLASS',
        'FIO-ESM'
      ]
      fx_variables:
        sftlf:
          mip: fx
    area_statistics:
      operator: sum
    convert_units:
      units: Pg m-2

  cstorage_map:
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'BNU-ESM',
        'HWSD',
        'CESM2-WACCM',
        'EC-Earth3-CC',
        'GFDL-ESM2M',
        'GFDL-ESM4',
        'FLUXCOM',
        'HWSD+NCSCD',
        'GLASS',
        'FIO-ESM'
      ]
      fx_variables:
        sftlf:
          mip: fx
    regrid:
      target_grid: 2x2
      scheme: nearest
    #climate_statistics:
    #  operator: mean
    #convert_units:
    #  units: Pg m-2
    #mask_multimodel:

