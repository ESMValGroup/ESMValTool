PROVENANCE_ANCHOR: &provenance
  realms:
    - atmos
  themes:
    - phys
    - ghg
    - carbon

preprocessors:

  ts_annual: &annual
    convert_units:
      units: Pg m-2 yr-1

  glob_sum: &sum
    <<: *annual
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'JMA-TRANSCOM',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'EC-Earth3-CC',
        'GFDL-ESM4',
        'BNU-ESM',
        'FLUXCOM',
        'FIO-ESM',
        'HWSD+NCSCD',
        'GLASS'
      ]
      fx_variables:
        sftlf:
          mip: fx
   # mask_landsea:
   #   mask_out: sea
   #   threshold: 100.
    regrid:
      target_grid: 2x2
      scheme: nearest
    mask_multimodel:
    area_statistics:
      operator: sum

  nh_sum:
    <<: *sum
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 20
      end_latitude: 90

  sh_sum:
    <<: *sum
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: 20

  trop_sum:
    <<: *sum
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -20
      end_latitude: 20

  glob_avg: &avg
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'JMA-TRANSCOM',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'EC-Earth3-CC',
        'GFDL-ESM4',
        'BNU-ESM',
        'FLUXCOM',
        'FIO-ESM',
        'HWSD+NCSCD',
        'GLASS'
      ]
      fx_variables:
        sftlf:
          mip: fx
    #mask_landsea: - not needed due to mask_multimodel!
    #  mask_out: sea
    #  threshold: 100.
    regrid:
      target_grid: 2x2
      scheme: nearest
    mask_multimodel:
    area_statistics:
      operator: mean

  nh_avg:
    <<: *avg
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 20
      end_latitude: 90

  sh_avg:
    <<: *avg
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: 20

  trop_avg:
    <<: *avg
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -20
      end_latitude: 20


