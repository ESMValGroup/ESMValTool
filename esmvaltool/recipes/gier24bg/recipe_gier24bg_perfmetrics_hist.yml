PROVENANCE_ANCHOR: &provenance
  realms:
    - atmos
  themes:
    - phys
    - ghg
    - carbon

preprocessors:

  ppNOLEV1:
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'BNU-ESM',
        'HWSD',
        'CESM2-WACCM',
        'EC-Earth3-CC',
        'GFDL-ESM2M',
        'GFDL-ESM4',
        'FLUXCOM',
        'HWSD+NCSCD',
        'GLASS'
      ]
      fx_variables:
        sftlf:
          mip: fx
    regrid:
      target_grid: 2x2 #reference_dataset
      scheme: linear
    mask_multimodel:
    mask_fillvalues:
      threshold_fraction: 0.95

  ppNOLEV2:
    weighting_landsea_fraction:
      area_type: land
      exclude: [
        'bcc-csm1-1-m',
        'GCP',
        'inmcm4',
        'LAI3g',
        'GIMMS-LAI4g',
        'MTE',
        'NDP',
        'CNRM-ESM2-1',
        'UKESM1-0-LL',
        'BNU-ESM',
        'HWSD',
        'CESM2-WACCM',
        'EC-Earth3-CC',
        'GFDL-ESM2M',
        'GFDL-ESM4',
        'FLUXCOM',
        'HWSD+NCSCD',
        'GLASS'
      ]
      fx_variables:
        sftlf:
          mip: fx
    regrid:
      target_grid: 2x2 #reference_dataset
      scheme: linear
    mask_fillvalues:
      threshold_fraction: 0.95


diagnostics:

  nbp:
    description: surface_net_downward_mass_flux_of_carbon_dioxide_expressed_as_carbon_due_to_all_land_processes
    themes:
      - phys
    realms:
      - land
    variables:
      nbp:
        short_name: nbp
        preprocessor: ppNOLEV1
        reference_dataset: Jena_CarboScope
        alternative_dataset: CAMS
        mip: Lmon
        project: CMIP5
        exp: historical
        ensemble: r1i1p1
        start_year: 1986
        end_year: 2005
        additional_datasets: *all
    additional_datasets:

      - {dataset: Jena_CarboScope, project: OBS6, type: reanaly, version: v2020,
         tier: 2} #, start_year: 1957, end_year: 2014}
      - {dataset: CAMS, project: OBS6, type: reanaly, version: v20r2,
         tier: 2}
    scripts:
      grading: &grading_settings
        script: perfmetrics/main.ncl
        # Plot type ('cycle', 'zonal', 'latlon', 'cycle_latlon', 'cycle_zonal')
        plot_type: cycle_latlon
        # Time average ('opt' argument of time_operations.ncl)
        time_avg: monthlyclim
        # Region ('global', 'trop', 'nhext', 'shext')
        region: global
        # Plot standard deviation ('all', 'none', 'ref_model' or dataset name)
        plot_stddev: ref_model
        # Plot legend in a separate file
        legend_outside: true
        # Plot style
        styleset: CMIP5
        # Calculate grading
        calc_grading: true
        # Metric ('RMSD', 'BIAS', taylor')
        metric: [RMSD]
        # Normalization ('mean', 'median', 'centered_median', 'none')
        normalization: [centered_median]
        exclude_mmm: [ 'EC-Earth3-CC', 'EC-Earth3-Veg', 'MIROC-ESM', 'MIROC-ESM-CHEM' ]
      grading_nh:
        <<: *grading_settings
        region: nh
      grading_sh:
        <<: *grading_settings
        region: sh
      grading_trop:
        <<: *grading_settings
        region: trop

  gpp:
    description: gross primary productivity
    themes:
      - phys
    realms:
      - land
    variables:
      gpp:
        short_name: gpp
        preprocessor: ppNOLEV1
        reference_dataset: FLUXCOM
        alternative_dataset: GLASS
        mip: Lmon
        project: CMIP5
        exp: historical
        ensemble: r1i1p1
        start_year: 1986
        end_year: 2005
        additional_datasets: *all
    additional_datasets:

      - { dataset: GLASS, project: OBS6, type: reanaly, version: V40, tier: 2 }
      #- {dataset: MTE, project: OBS, type: reanaly, version: May12, tier: 3}
      - { dataset: FLUXCOM, project: OBS, type: reanaly,
            version: ANN-v1, tier: 3 }
    scripts:
      grading:
        <<: *grading_settings
        exclude_mmm: []
      grading_nh:
        <<: *grading_settings
        region: nh
        exclude_mmm: []
      grading_sh:
        <<: *grading_settings
        region: sh
        exclude_mmm: []
      grading_trop:
        <<: *grading_settings
        region: trop
        exclude_mmm: []

  lai:
    description: leaf area index
    themes:
      - phys
    realms:
      - land
    variables:
      lai:
        short_name: lai
        preprocessor: ppNOLEV1
        reference_dataset: GIMMS-LAI4g
        alternative_dataset: GLASS
        mip: Lmon
        project: CMIP5
        exp: historical
        ensemble: r1i1p1
        start_year: 1986
        end_year: 2005
        additional_datasets: *all
    additional_datasets:

      #- {dataset: LAI3g, project: OBS, type: reanaly,
      #   version: 1_regridded, tier: 3}
      - {dataset: GIMMS-LAI4g, project: OBS6, type: reanaly, version: V1.0, tier: 2}
      - { dataset: GLASS, project: OBS6, type: reanaly, version: V40, tier: 2 }
    scripts:
      grading:
        <<: *grading_settings
        exclude_mmm: ['BNU-ESM', 'MRI-ESM1']
      grading_nh:
        <<: *grading_settings
        region: nh
        exclude_mmm: ['BNU-ESM', 'MRI-ESM1']
      grading_sh:
        <<: *grading_settings
        region: sh
        exclude_mmm: ['BNU-ESM', 'MRI-ESM1']
      grading_trop:
        <<: *grading_settings
        region: trop
        exclude_mmm: ['BNU-ESM', 'MRI-ESM1']

