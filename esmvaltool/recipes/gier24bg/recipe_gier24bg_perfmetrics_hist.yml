  ### COLLECT METRICS #########################################################
  collect:
    description: Wrapper to collect and plot previously calculated metrics
    scripts:
      RMSD:
        script: perfmetrics/collect.ncl
        ancestors: ['*/grading*']
        metric: RMSD
        label_bounds: [-0.5, 0.5]
        label_scale: 0.1
        disp_values: false
        cm_interval: [2, 241]
        # Sort dataset in alphabetic order (excluding MMM)
        #sort: true
        project_order: ['CMIP5', 'CMIP6']
        diag_order: ['nbp-global', 'nbp-nh', 'nbp-sh', 'nbp-trop',
                     'gpp-global', 'gpp-nh', 'gpp-sh', 'gpp-trop',
                     'lai-global', 'lai-nh', 'lai-sh', 'lai-trop']
                     # 'cVeg-global', 'cSoil-global']
