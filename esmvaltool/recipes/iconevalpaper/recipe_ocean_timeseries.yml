preprocessors:
  create_amoc_time_series:
    annual_statistics:
      operator: mean
    convert_units:
      units: Tg s-1
  create_nino34_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: -170
      end_longitude: -120
      start_latitude: -5
      end_latitude: 5
    mask_landsea:
      mask_out: land
    anomalies:
      period: month
    rolling_window_statistics:
      coordinate: time
      operator: mean
      window_length: 3
    area_statistics:
      operator: mean
  create_ohc_total_anomaly_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    axis_statistics:
      axis: Z
      operator: sum
      weights: false
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
    anomalies:
      period: full
      reference:
        start_year: 1979
        start_month: 1
        start_day: 1
        end_year: 1988
        end_month: 12
        end_day: 31
    convert_units:
      units: ZJ
  create_ohc_300m_anomaly_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_volume:
      z_min: 0.0
      z_max: 300.0
      interval_bounds: left_closed
    axis_statistics:
      axis: Z
      operator: sum
      weights: false
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
    anomalies:
      period: full
      reference:
        start_year: 1979
        start_month: 1
        start_day: 1
        end_year: 1988
        end_month: 12
        end_day: 31
    convert_units:
      units: ZJ
  create_ohc_2000m_anomaly_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_volume:
      z_min: 0.0
      z_max: 2000.0
      interval_bounds: left_closed
    axis_statistics:
      axis: Z
      operator: sum
      weights: false
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
    anomalies:
      period: full
      reference:
        start_year: 1979
        start_month: 1
        start_day: 1
        end_year: 1988
        end_month: 12
        end_day: 31
    convert_units:
      units: ZJ
  create_tos_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
    convert_units:
      units: degC
