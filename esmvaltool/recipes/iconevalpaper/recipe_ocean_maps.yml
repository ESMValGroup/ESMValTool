  maps_tos:
    description: Map plots of sea surface temperature.
    themes:
    - phys
    realms:
    - ocean
    variables:
      tos:
        mip: Omon
        preprocessor: create_map
        title: Sea Surface Temperature
        additional_datasets:
        - project: OBS6
          dataset: WOA
          type: clim
          version: '2018'
          tier: 2
          reference_for_monitor_diags: true
          alias: WOA
          timerange: 20000101/20001231
    scripts:
      plot:
        script: monitor/multi_datasets.py
        facet_used_for_labels: alias
        group_variables_by: variable_group
        plot_filename: '{plot_type}_{exp}_{real_name}_{dataset}_{mip}'
        plot_folder: '{plot_dir}'
        plots:
          map:
            common_cbar: true
            fontsize: 8
            gridline_kwargs:
              color: darkgray
              linewidth: 0.5
              alpha: 0.3
            pyplot_kwargs:
              suptitle: '{title}'
            plot_kwargs:
              default:
                levels: 12
