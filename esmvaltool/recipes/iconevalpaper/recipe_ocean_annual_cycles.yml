preprocessors:
  create_monthly_climatology_southern_ocean:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_shape:
      shapefile: ar6
      crop: true
      decomposed: true
      ids:
        Name:
        - Southern-Ocean
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
  create_monthly_climatology_labrador_sea:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: -67
      end_longitude: -42
      start_latitude: 46
      end_latitude: 66
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
  create_monthly_climatology_weddell_sea:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: -66
      end_longitude: -16
      start_latitude: -77
      end_latitude: -60
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
