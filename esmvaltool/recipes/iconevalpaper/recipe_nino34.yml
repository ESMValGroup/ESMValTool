preprocessors:
  create_global_annual_mean_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
    convert_units:
      units: degC
  create_nino34_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: -170
      end_longitude: -120
      start_latitude: -5
      end_latitude: 5
    mask_landsea:
      mask_out: land
    anomalies:
      period: month
    rolling_window_statistics:
      coordinate: time
      operator: mean
      window_length: 3
    area_statistics:
      operator: mean
