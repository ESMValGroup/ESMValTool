documentation:
  title: CORDEX-CMIP5 performance metrics
  description: 'This is an example recipe that computes performance metrics for CORDEX-CMIP5 models.

    The outcome of this recipe is used for deliverable DX.X of the project ESO4Clima.'
  authors:
  - loosveldt-tomas_saskia
  - andela_bouwe
  maintainer:
  - andela_bouwe

preprocessors:
  default:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    regrid:
      scheme: linear
      target_grid: EUR-11
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      exclude:
      - reference_dataset
      span: overlap
      statistics:
      - operator: mean
      - operator: median
  land:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    mask_landsea:
      mask_out: sea
    regrid:
      scheme: linear
      target_grid: EUR-11
    convert_units:
      units: degC
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      exclude:
      - reference_dataset
      span: overlap
      statistics:
      - operator: mean
      - operator: median
  sea:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    mask_landsea:
      mask_out: land
    regrid:
      scheme: linear
      target_grid: EUR-11
    convert_units:
      units: degC
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      exclude:
      - reference_dataset
      span: overlap
      statistics:
      - operator: mean
      - operator: median

datasets:
- {dataset: HIRHAM5, driver: CNRM-CERFACS-CNRM-CM5, institute: DMI, rcm_version: v2}
- {dataset: HIRHAM5, driver: ICHEC-EC-EARTH, ensemble: r12i1p1, institute: DMI}
- {dataset: HIRHAM5, driver: IPSL-IPSL-CM5A-MR, institute: DMI}
- {dataset: HIRHAM5, driver: MPI-M-MPI-ESM-LR, institute: DMI}
- {dataset: HadREM3-GA7-05, driver: CNRM-CERFACS-CNRM-CM5, institute: MOHC, rcm_version: v2}
- {dataset: HadREM3-GA7-05, driver: MPI-M-MPI-ESM-LR, institute: MOHC}
- {dataset: RCA4, driver: ICHEC-EC-EARTH, institute: SMHI}
- {dataset: RCA4, driver: NCC-NorESM1-M, institute: SMHI}

