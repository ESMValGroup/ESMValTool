documentation:
  title: CORDEX-CMIP5 performance metrics
  description: 'This is an example recipe that computes performance metrics for CORDEX-CMIP5
    models.

    The outcome of this recipe is used for deliverable DX.X of the project ESO4Clima.'
  authors:
  - loosveldt-tomas_saskia
  - andela_bouwe
  maintainer:
  - andela_bouwe
preprocessors:
  default:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    regrid:
      target_grid: EUR-11
      scheme: linear
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      span: overlap
      statistics:
      - operator: mean
      - operator: median
      exclude:
      - reference_dataset
  land:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    mask_landsea:
      mask_out: sea
    regrid:
      target_grid: EUR-11
      scheme: linear
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      span: overlap
      statistics:
      - operator: mean
      - operator: median
      exclude:
      - reference_dataset
  sea:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    mask_landsea:
      mask_out: land
    regrid:
      target_grid: EUR-11
      scheme: linear
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      span: overlap
      statistics:
      - operator: mean
      - operator: median
      exclude:
      - reference_dataset

datasets:
- {dataset: ALADIN63, institute: CNRM, rcm_version: v2, driver: CNRM-CERFACS-CNRM-CM5}
- {dataset: HIRHAM5, institute: DMI, rcm_version: v2, driver: CNRM-CERFACS-CNRM-CM5}
- {dataset: HIRHAM5, institute: DMI, driver: ICHEC-EC-EARTH, ensemble: r12i1p1}
- {dataset: HIRHAM5, institute: DMI, driver: IPSL-IPSL-CM5A-MR}
- {dataset: HIRHAM5, institute: DMI, driver: MPI-M-MPI-ESM-LR}
- {dataset: HadREM3-GA7-05, institute: MOHC, rcm_version: v2, driver: CNRM-CERFACS-CNRM-CM5}
