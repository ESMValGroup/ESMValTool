- {dataset: RCA4, institute: SMHI, driver: NCC-NorESM1-M}
diagnostics:
  diagnostic:
    scripts:
      portrait:
        cbar_kwargs:
          extend: both
          label: Relative RMSE
        default_split: Ref1
        group_by: project
        nan_color: '#bdbdbd'
        normalize: centered_median
        plot_kwargs:
          vmax: 0.5
          vmin: -0.5
        script: portrait_plot.py
        x_by: alias
        y_by: variable
    variables:
      clivi:
