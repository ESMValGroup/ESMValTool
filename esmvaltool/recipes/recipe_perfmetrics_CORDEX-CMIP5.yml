documentation:
  title: CORDEX-CMIP5 performance metrics
  description: 'This is an example recipe that computes performance metrics for CORDEX-CMIP5
    models.

    The outcome of this recipe is used for deliverable DX.X of the project ESO4Clima.'
  authors:
  - loosveldt-tomas_saskia
  - andela_bouwe
  maintainer:
  - andela_bouwe
preprocessors:
  default:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    regrid:
      target_grid: EUR-11
      scheme: linear
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      span: overlap
      statistics:
      - operator: mean
      - operator: median
      exclude:
      - reference_dataset
  land:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    mask_landsea:
      mask_out: sea
    regrid:
      target_grid: EUR-11
      scheme: linear
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      span: overlap
      statistics:
      - operator: mean
      - operator: median
      exclude:
      - reference_dataset
  sea:
    custom_order: true
    monthly_statistics:
      operator: mean
    climate_statistics:
      period: full
      operator: mean
    mask_landsea:
      mask_out: land
    regrid:
      target_grid: EUR-11
      scheme: linear
    distance_metric:
      metric: weighted_rmse
    multi_model_statistics:
      span: overlap
      statistics:
      - operator: mean
      - operator: median
      exclude:
      - reference_dataset

datasets:
- {dataset: ALADIN63, driver: CNRM-CERFACS-CNRM-CM5, institute: CNRM, rcm_version: v2}
- {dataset: HIRHAM5, driver: CNRM-CERFACS-CNRM-CM5, institute: DMI, rcm_version: v2}
- {dataset: HIRHAM5, driver: ICHEC-EC-EARTH, ensemble: r12i1p1, institute: DMI}
- {dataset: HIRHAM5, driver: IPSL-IPSL-CM5A-MR, institute: DMI}
- {dataset: HIRHAM5, driver: MPI-M-MPI-ESM-LR, institute: DMI}
- {dataset: HadREM3-GA7-05, driver: CNRM-CERFACS-CNRM-CM5, institute: MOHC, rcm_version: v2}
- {dataset: HadREM3-GA7-05, driver: MPI-M-MPI-ESM-LR, institute: MOHC}
- {dataset: RCA4, driver: ICHEC-EC-EARTH, institute: SMHI}
- {dataset: RCA4, driver: MPI-M-MPI-ESM-LR, ensemble: 'r(2:3)i1p1', institute: SMHI}
- {dataset: RCA4, driver: NCC-NorESM1-M, institute: SMHI}
diagnostics:
  diagnostic:
    scripts:
      portrait:
        cbar_kwargs:
          extend: both
          label: Relative RMSE
        default_split: Ref1
        group_by: project
        nan_color: '#bdbdbd'
        normalize: centered_median
        plot_kwargs:
          vmax: 0.5
          vmin: -0.5
        script: portrait_plot.py
        x_by: alias
        y_by: variable
    variables:
      clivi:
        additional_datasets:
        - {dataset: ALADIN63, driver: MOHC-HadGEM2-ES, institute: CNRM}
