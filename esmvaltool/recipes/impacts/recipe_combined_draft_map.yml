# Note: the following models are just examples
datasets:
  - {project: CMIP6, dataset: MPI-ESM1-2-HR, exp: historical, ensemble: r1i1p1f1, grid: gn}
    #- {dataset: ICON-XPP, exp: historical-202510p1, project: ICON} #, timerange: 20010601/20010901


preprocessors:

  # 
  temperature_preproc:
    ##In the future extract europe or similar with: 
    #extract_region:
    #  start_latitude: -30
    #  end_latitude: 30
    #  start_longitude: 0
    #  end_longitude: 360
    convert_units:
      units: degC
    local_solar_time: # Needed to ensure dates are local time and not UTC [otherwise extremes at one noon could count for two days. TODO: maybe consider how this could influence results for e.g. low temperatures at night]
    mask_landsea:
      mask_out: sea

  
      
  precipitation_preproc:
    custom_order: true
    local_solar_time:
    mask_landsea:
      mask_out: sea
    convert_units:
      units: mm day-1


  snow_preproc:
    custom_order: true
    local_solar_time:
    mask_landsea:
      mask_out: sea
    convert_units:
      units: mm

#####################

  radiation_preproc:
    climate_statistics:
      operator: mean  
    


  ocean_preproc:
    regrid:
      target_grid: 2x2
      scheme: linear
    climate_statistics:
      operator: mean
    mask_landsea:
      mask_out: land

