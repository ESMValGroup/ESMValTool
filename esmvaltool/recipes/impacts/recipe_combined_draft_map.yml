  - {project: CMIP6, dataset: MPI-ESM1-2-LR, exp: historical, ensemble: r1i1p1f1, grid: gn}
  #- {dataset: ESACCI-SNOW, project: OBS6, mip: day, tier: 2, type: sat, version: v2.0}
    #- {dataset: ICON-XPP, exp: historical-202510p1, project: ICON} #, timerange: 20010601/20010901


preprocessors:

  # 
  temperature_preproc:
    ##In the future extract europe or similar with: 
    #extract_region:
    #  start_latitude: -30
    #  end_latitude: 30
    #  start_longitude: 0
    #  end_longitude: 360
    convert_units:
      units: degC
    local_solar_time: # Needed to ensure dates are local time and not UTC [otherwise extremes at one noon could count for two days. TODO: maybe consider how this could influence results for e.g. low temperatures at night]
    mask_landsea:
      mask_out: sea

  
      
  precipitation_preproc:
    custom_order: true
    local_solar_time:
    mask_landsea:
      mask_out: sea
    convert_units:
      units: mm day-1


  snow_preproc:
    custom_order: true
    #local_solar_time:
    regrid:
      target_grid: 2x2
      scheme: linear
    
    regrid_time:
    extract_time:
      start_year: 2001
      start_month: 2
      start_day: 3
      end_year: 2004
      end_month: 4
      end_day: 6
    # mask_landsea:
    #   mask_out: sea
    convert_units:
      units: mm

#####################

  radiation_preproc:
    climate_statistics:
      operator: mean  
    


  ocean_preproc:
    regrid:
      target_grid: 2x2
      scheme: linear
    climate_statistics:
      operator: mean
    # mask_landsea:
    #   mask_out: land



 


diagnostics:
  # TODO: this is not working yet, maybe also look into https://github.com/ESMValGroup/ESMValCore/issues/2892
  # additional_datasets: 
  #   - {dataset: ERA5, project: native6, family: E5, level: sf, type: fc, type_id: 12, tres: 1D, grib_id: 201, raw_name: mx2t, short_name: tasmax, units: K, tier: 3, mip: day,  reference_for_monitor_diags: true} #maybe change to tres: 1H? #todo: check entries, in part. if type fc is reasonable choice...
  plot_days_tmax_40:
    description: Map showing number of days where the temperature exceeds 40°C.
    variables:
      tasmax:
        timerange: 20000601/20030901
        mip: day
        preprocessor: temperature_preproc
    scripts:
      diag_number_of_exceeding_days:
        script: impact/diagnostic_draft3.py
        plot_folder: '{plot_dir}'
        plot_filename: '{plot_type}_{real_name}_{mip}'
        facet_used_for_labels: dataset
        options:
          threshold_conversion:
            inverted: false
            accumulated: false
            threshold: 40
        plots:
          # timeseries:
          map:
            caption: 'Number of days per year with temperatures exceeding 40°C for {dataset}.'
            common_cbar: true
            fontsize: 10
            plot_kwargs:
              default:
                cmap: 'coolwarm'

