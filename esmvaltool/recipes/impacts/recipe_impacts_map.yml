    description: Map showing number of days where the rain rate exceeds 1 mm.
    variables:
      pr:
        timerange: 19950101/20141231
        mip: day
        preprocessor: precipitation_preproc
    scripts:
      diag_number_of_exceeding_days:
        <<: *exceeding_day_config
        options:
          threshold_conversion:
            inverted: false
            accumulated: false
            threshold: 1 #1,10
        plots:
          map:     
            caption: 'Number of days per year with rain rate exceeding 1 mm for {dataset}.'
            common_cbar: true
            fontsize: 10
            plot_kwargs:
              default:
                cmap: 'coolwarm'
          


  plot_days_prmaxthreshold10:
    additional_datasets:
        - {dataset: ERA5, project: OBS6, type: reanaly, tier: 3, version: 1, short_name: pr ,  reference_for_monitor_diags: true}
    
    description: Map showing number of days where the rain rate exceeds 10 mm.
    variables:
      pr:
        timerange: 19950101/20141231
        mip: day
