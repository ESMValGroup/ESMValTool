  plot_snwe_10:
    additional_datasets:
      - {dataset: ESACCI-SNOW, project: OBS6, mip: day, tier: 2, type: sat, version: v2.0, reference_for_monitor_diags: true}
    description: Map showing number of days there is more than 10 cm of snow water equivalent.
    variables:
      snw:
        timerange: 19950101/20141231
        mip: day
        preprocessor: snow_preproc
    scripts:
      diag_number_of_exceeding_days:
        <<: *exceeding_day_config
        options:
          threshold_conversion:
            inverted: false
            accumulated: false
            threshold: 100
        plots:
          #timeseries:
          map:
            caption: 'Number of days per year with ... for {dataset}.'
            common_cbar: true
            fontsize: 10
            plot_kwargs:
              default:
                cmap: 'coolwarm'





  plot_sst:
    additional_datasets: 
      - {dataset: ORAS5, project: native6, mip: Omon, type: OBS6, version: 'CONS_v0.1', tier: 2, ugrid: false, var_name: tos, raw_name: sosstsst, raw_units: deg_C, supplementary_variables: [{short_name: areacello, skip: true},{short_name: sftof, skip: true}], horizontal_grid: /work/bd1083/b382555/extraobsraw/Tier2/ORAS5/grids/oras5_mesh_T.nc, reference_for_monitor_diags: true}
    description: Plot maps showing the sea surface temperature.
    variables:
      tos:
        timerange: 19950101/20141231
        mip: Oday
        preprocessor: ocean_preproc
    scripts:
      plot: &map_config
        script: impact/multi_datasets_with_threshold.py
