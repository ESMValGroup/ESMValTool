# ESMValTool
# TODO: Include warning: Currently not full year periods are deprechiated cause they could produce missleading results...
# TODO: currently need to call map function after timeseries such that cube is still intact for timeseries, maybe fix this in diagnostic...






---
documentation:
  title: Impact diagnostic.
  description: >
    Diagnostic to plot the temporal mean of selected climate impact drivers discussed in Elling et al. 2026 on a global map.
  authors:
    - caspers_laura
  maintainer:
    - caspers_laura

# Note: the following models are just examples
datasets:
  #- {project: CMIP6, dataset: MPI-ESM1-2-HR, exp: historical, ensemble: r1i1p1f1, grid: gn}
  - {project: CMIP6, dataset: MPI-ESM1-2-LR, exp: historical, ensemble: r1i1p1f1, grid: gn}
 
    #- {dataset: ICON-XPP, exp: historical-202510p1, project: ICON} #, timerange: 20010601/20010901


preprocessors:

  temperature_preproc:
    ##In the future extract europe or similar with: 
    #extract_region:
    #  start_latitude: -30
    #  end_latitude: 30
    #  start_longitude: 0
    #  end_longitude: 360
    regrid:
      target_grid: 2x2
      scheme: linear
    convert_units:
      units: degC
    local_solar_time: # Needed to ensure dates are local time and not UTC [otherwise extremes at one noon could count for two days. TODO: maybe consider how this could influence results for e.g. low temperatures at night]
    mask_landsea:
      mask_out: sea

  
      
  precipitation_preproc:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    local_solar_time:
    mask_landsea:
      mask_out: sea
    convert_units:
      units: mm day-1


  snow_preproc:
    custom_order: true
    #local_solar_time:
    regrid:
      target_grid: 2x2
      scheme: linear
    regrid_time:
    #needed to extract a timeframe here, in order for the time coordinate of the observations to match:
    extract_time:
      start_year: 1995
      start_month: 1
      start_day: 1
      end_year: 2014
      end_month: 12
      end_day: 31
    # mask_landsea:
    #   mask_out: sea
    convert_units:
      units: mm

#####################

  radiation_preproc:
    regrid:
      target_grid: 2x2
      scheme: linear
    climate_statistics:
      operator: mean  
    


  ocean_preproc:
    regrid:
      target_grid: 2x2
      scheme: linear
    climate_statistics:
      operator: mean
    # mask_landsea:
    #   mask_out: land



 


diagnostics:
   
  plot_days_tmax_40:
    additional_datasets: 
      - {dataset: ERA5, project: OBS6, short_name: tasmax, type: reanaly, tier: 3, version: 1,  reference_for_monitor_diags: true}
    description: Map showing number of days where the temperature exceeds 40°C.
    variables:
      tasmax:
        timerange: 19950101/20141231
        mip: day
        preprocessor: temperature_preproc
    scripts:
      diag_number_of_exceeding_days: &exceeding_day_config
        script: impact/multi_datasets_with_threshold.py
        plot_folder: '{plot_dir}'
        plot_filename: '{plot_type}_{real_name}_{mip}'
        facet_used_for_labels: dataset
        options:
          threshold_conversion:
            inverted: false
            accumulated: false
            threshold: 40
        plots:
          # timeseries:
          map:
            caption: 'Number of days per year with temperatures exceeding 40°C for {dataset}.'
            common_cbar: true
            fontsize: 10
            plot_kwargs:
              default:
                cmap: 'coolwarm'

  plot_days_tmin_0:
    additional_datasets: 
      - {dataset: ERA5, project: OBS6, short_name: tasmin, type: reanaly, tier: 3, version: 1,  reference_for_monitor_diags: true}
  
    description: Map showing number of days where the temperature drops below 0°C.
    variables:
      tasmin:
        timerange: 19950101/20141231
        mip: day
        preprocessor: temperature_preproc
    scripts:
      diag_number_of_exceeding_days:
        <<: *exceeding_day_config
        options:
          threshold_conversion:
            inverted: true
            accumulated: false
            threshold: 0 
        plots:
          map:
            caption: 'Number of days per year with temperatures drops below 0°C for {dataset}.'
            common_cbar: true
            fontsize: 10
            plot_kwargs:
              default:
                cmap: 'coolwarm'

  plot_days_prmaxthreshold1:
    additional_datasets: 
