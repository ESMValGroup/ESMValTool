      - {dataset: ORAS5, project: native6, mip: Omon, type: OBS6, version: 'CONS_v0.1', tier: 2, ugrid: false, var_name: mlotst, raw_name: somxl030, raw_units: m, supplementary_variables: [{short_name: areacello, skip: true},{short_name: sftof, skip: true}], horizontal_grid: /work/bd1083/b382555/extraobsraw/Tier2/ORAS5/grids/oras5_mesh_T.nc,  reference_for_monitor_diags: true} 
    description: Plot maps showing the mixed layer depth.
    variables:
      mlotst:
        timerange: 19950101/20141231
        mip: Omon #or Eday
        preprocessor: ocean_preproc
    scripts:
