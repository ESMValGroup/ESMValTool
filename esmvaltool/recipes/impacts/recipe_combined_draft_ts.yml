preprocessors:

  # 
  temperature_preproc:
    ##In the future extract europe or similar with: 
    #extract_region:
    #  start_latitude: -30
    #  end_latitude: 30
    #  start_longitude: 0
    #  end_longitude: 360
    convert_units:
      units: degC
    local_solar_time: # Needed to ensure dates are local time and not UTC [otherwise extremes at one noon could count for two days. TODO: maybe consider how this could influence results for e.g. low temperatures at night]
    mask_landsea:
      mask_out: sea

  
      
  precipitation_preproc:
    custom_order: true
    local_solar_time:
    mask_landsea:
      mask_out: sea
    convert_units:
      units: mm day-1


  snow_preproc:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    local_solar_time:
    mask_landsea:
      mask_out: sea
    convert_units:
      units: mm

  



  radiation_preproc_timeline: &radiation_preproc_config
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean  

  radiation_preproc_timeline_min:
    <<: *radiation_preproc_config
    area_statistics:
      operator: min
     

  radiation_preproc_timeline_max:
    <<: *radiation_preproc_config
    area_statistics:
      operator: max  

  ocean_preproc_timeline: &ocean_preproc_config
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    area_statistics:
      operator: mean
      #Todo: Masking does not work with oras5 -> is masking necessary?
    # mask_landsea: 
    #   mask_out: land
    annual_statistics:
      operator: mean

  ocean_preproc_timeline_max:
    <<: *ocean_preproc_config
    area_statistics:
      operator: max

  ocean_preproc_timeline_min:
    <<: *ocean_preproc_config
    area_statistics:
      operator: min


  zostoga_preproc_timeline:
    # custom_order: true
    # regrid:
    #   target_grid: 2x2
    #   scheme: linear
    # mask_landsea:
    #   mask_out: land
    annual_statistics:
      operator: mean


 


