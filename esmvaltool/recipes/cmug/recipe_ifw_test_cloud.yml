# ESMValTool
---
documentation:
  title: IFW test
  description: >
    Test processing of IFW model data.
  authors:
    - lauer_axel
  maintainer:
    - lauer_axel


#datasets:
#  - {project: IFW, dataset: ifwf, fstep: '0', frequency: 12hr, alias: 'IFWf (step 0)', activity: 'CMUG', exp: 'step0'}


preprocessors:

  monthly_climatology:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:
    climate_statistics:
      period: full

  all_days:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:

  ma_season_mean:
    regrid:
      target_grid: 2.5x2.5
      scheme: nearest
    climate_statistics:
      operator: mean
      period: season
      seasons: ['DJF', 'MAM', 'JJA', 'SON']
    multi_model_statistics:
      span: overlap
      statistics: [mean]

  aeronet_model:
    climate_statistics:
      operator: mean
      period: season


diagnostics:

  maps:
    description: Plot monthly mean maps.
    variables:
