# ESMValTool
---
documentation:
  title: IFW test
  description: >
    Test processing of IFW model data.
  authors:
    - lauer_axel
  maintainer:
    - lauer_axel


#datasets:
#  - {project: IFW, dataset: ifwf, fstep: '0', frequency: 12hr, alias: 'IFWf (step 0)', activity: 'CMUG', exp: 'step0'}


preprocessors:

  monthly_climatology:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:
    climate_statistics:
      period: full

  all_days:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:

  ma_season_mean:
    regrid:
      target_grid: 2.5x2.5
      scheme: nearest
    climate_statistics:
      operator: mean
      period: season
      seasons: ['DJF', 'MAM', 'JJA', 'SON']
    multi_model_statistics:
      span: overlap
      statistics: [mean]

  aeronet_model:
    climate_statistics:
      operator: mean
      period: season


diagnostics:

  scatterplots:
    description: Scatterplots.
    variables:
      od550aer:
        timerange: '20200601/20200630'
        mip: aero
        preprocessor: all_days
#        additional_datasets:
#          - {dataset: ESACCI-AEROSOL, project: OBS, tier: 2, frequency: day,
#             type: sat, version: SLSTR-SU-v1.12-DAILY, alias: 'ESACCI-AEROSOL'}
      lwp:
        timerange: '20200601/20200630'
        mip: CFday
        preprocessor: all_days
#        additional_datasets:
#          - {dataset: CLARA-AVHRR, project: OBS6, tier: 3, frequency: day,
#             type: sat, version: A3-DAILY, reference_for_monitor_diags: true, alias: 'CLARA-A3'}
    additional_datasets:
      - {project: IFW, dataset: ifwf, fstep: '0', frequency: 12hr, alias: 'IFWf (step 0)'}
    scripts:
      plot:
#        script: seaborn_diag.py
#        seaborn_func: regplot
#        reset_index: true
#        write_netcdf: true
#        seaborn_kwargs:
#          x: lwp
#          y: od550aer
#        plot_object_methods:
#          set:
#            xlabel: 'liquid water path [kg m-2]'
#            ylabel: 'AOD550 [1]'
#        seaborn_settings:
#          style: ticks
#        suptitle: 'AOD550 vs LWP'
        script: seaborn_jointplot_histogram.py
        x: lwp
        y: od550aer
        bins: 50
        joint_kws:
          vmax: 0.015
          cmap: YlGnBu
        cbar: true
        cbar_kws:
          extend: 'max'
        marginal_kws:
          color: darkturquoise
        seaborn_settings:
          style: ticks
          rc:
            axes.titlepad: 15.0
        joint_grid_kws:
          xlim: [0, 0.3]
          ylim: [0, 1]
        suptitle: 'LWP vs AOD550'
        plot_filename: 'jointplot_lwp_od550aer'
