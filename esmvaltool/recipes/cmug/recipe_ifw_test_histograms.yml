# ESMValTool
---
documentation:
  title: IFW test
  description: >
    Test processing of IFW model data.
  authors:
    - lauer_axel
  maintainer:
    - lauer_axel


#datasets:
#  - {project: IFW, dataset: ifwf, fstep: '0', frequency: 12hr, alias: 'IFWf (step 0)', activity: 'CMUG', exp: 'step0'}


preprocessors:

  monthly_climatology:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:
    climate_statistics:
      period: full

  all_days:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:

  ma_season_mean:
    regrid:
      target_grid: 2.5x2.5
      scheme: nearest
    climate_statistics:
      operator: mean
      period: season
      seasons: ['DJF', 'MAM', 'JJA', 'SON']
    multi_model_statistics:
      span: overlap
      statistics: [mean]

  aeronet_model:
    climate_statistics:
      operator: mean
      period: season


diagnostics:

  histograms:
    description: Plot PDFs from daily values.
    variables:
      od550aer:
        timerange: '20200601/20200630'
        mip: aero
        preprocessor: all_days
        additional_datasets:
          - {dataset: ESACCI-AEROSOL, project: OBS, tier: 2, frequency: day,
             type: sat, version: SLSTR-SU-v1.12-DAILY, alias: 'ESACCI-AEROSOL'}
    additional_datasets:
      - {project: IFW, dataset: ifwf, fstep: '0', frequency: 12hr, alias: 'IFWf (step 0)'}
    scripts:
      plot:
        script: seaborn_diag.py
        seaborn_func: displot
        reset_index: true
        write_netcdf: true
        seaborn_kwargs:
          kind: hist
          stat: density
#          binwidth: 0.025
          binwidth: 0.05
          x: od550aer
          hue: alias
#          facet_kws:
#            sharey: false
#          col: shape_id
#          col_order:
#            - tropics
#            - nh_midlat
#            - sh_midlat
#          col_wrap: 3
#        add_aux_coords: true
#        dropna_kwargs:
#          axis: 0
#          how: any
        legend_title: Dataset
        plot_object_methods:
          set:
            xlabel: 'AOD550 [1]'
#            xlim: [1.0, 1.5]
            xlim: [0, 1.5]
#            ylim: [0, 0.02]
#          set_titles: '{col_name}'
        seaborn_settings:
          style: ticks
          rc:
            axes.titlepad: 15.0
        suptitle: 'PDF of AOD550'
