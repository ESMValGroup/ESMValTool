# ESMValTool
---
documentation:
  title: MONARCH test
  description: >
    Test processing of MONARCH model data.
  authors:
    - lauer_axel
  maintainer:
    - lauer_axel


datasets:
  - {project: MONARCH, dataset: MONARCH, exp: control, frequency: 1hr, alias: 'MONARCH (control)'}
  - {project: MONARCH, dataset: MONARCH, exp: od550du_av, frequency: 1hr, alias: 'MONARCH (od550du_av)'}
  - {project: MONARCH, dataset: MONARCH, exp: od550du_av_an, frequency: 1hr, alias: 'MONARCH (od550du_av_an)'}
  - {dataset: ESACCI-AEROSOL, project: OBS6, tier: 2, frequency: day,
     type: sat, version: SLSTR-SU-v1.12-DAILY, reference_for_monitor_diags: true,
     alias: 'ESACCI-AEROSOL'}


preprocessors:

  monthly_climatology:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:
    climate_statistics:
      period: full

  all_days:
    custom_order: true
    daily_statistics:
    regrid:
      target_grid: 1x1
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_multimodel:


diagnostics:

  maps:
    description: Plot monthly mean maps.
    variables:
      od550dust:
        timerange: '20200601/20200630'
        mip: AERmon
        preprocessor: monthly_climatology
    scripts:
      plot:
        plot_folder: '{plot_dir}'
        plot_filename: '{plot_type}_{real_name}_{dataset}_{exp}'
        script: monitor/multi_datasets.py
        facet_used_for_labels: alias
        plots:
          map:
            common_cbar: true
            plot_kwargs:
              default:
                extend: max
                cmap: YlOrRd
                levels: [0.05, 0.1, 0.15, 0.2, 0.25, 0.5, 1.0, 1.5, 2.0, 2.5]
            plot_kwargs_bias:
              levels: [-1.0, -0.5, -0.2, -0.1, -0.05, 0.0, 0.05, 0.1, 0.2, 0.5, 1.0]
              extend: both


  histograms:
    description: Plot PDFs from daily values.
    variables:
      od550dust:
        timerange: '20200601/20200630'
        mip: AERmon
        preprocessor: all_days
    scripts:
      plot:
        script: seaborn_diag.py
        seaborn_func: displot
        reset_index: true
        write_netcdf: true
        facet_used_for_labels: alias
        seaborn_kwargs:
          kind: hist
          stat: density
          binwidth: 0.05
          x: od550dust
          hue: alias
#          facet_kws:
#            sharey: false
#          col: alias
#          col_wrap: 3
#        add_aux_coords: true
#        dropna_kwargs:
#          axis: 0
#          how: any
        legend_title: Dataset
        plot_object_methods:
          set:
            xlabel: 'AOD550dust [1]'
            xlim: [0.1, 1.5]
            ylim: [0, 0.125]
          set_titles: '{col_name}'
        seaborn_settings:
          style: ticks
          rc:
            axes.titlepad: 15.0
        suptitle: 'PDF of daily dust AOD550'
